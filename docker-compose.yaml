services:

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init/init.sql:/docker-entrypoint-initdb.d/init.sql

  mongodb:
    image: mongo:8
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root_password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init/init.js:/docker-entrypoint-initdb.d/init.js

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_ENABLE_KRAFT: yes
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      ALLOW_PLAINTEXT_LISTENER: yes
      KAFKA_KRAFT_CLUSTER_ID: abcdefghijklmnopqrstuv

  api-gateway:
    build:
      context: ./src/service/ory/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service

  auth-service:
    build:
      context: ./src/service/ory/auth-service
    container_name: auth-service
    env_file:
      - ./src/service/ory/auth-service/.env
    depends_on:
      - postgres
      - kafka

  user-service:
    build:
      context: ./src/service/ory/user-service
    container_name: user-service
    env_file:
      - ./src/service/ory/user-service/.env
    depends_on:
      - postgres
      - kafka

  product-service:
    build:
      context: ./src/service/ory/product-service
    container_name: product-service
    env_file:
      - ./src/service/ory/product-service/.env
    depends_on:
      - mongodb
      - kafka

  inventory-service:
    build:
      context: ./src/service/ory/inventory-service
    container_name: inventory-service
    env_file:
      - ./src/service/ory/inventory-service/.env
    depends_on:
      - postgres
      - kafka
      - product-service

  order-service:
    build:
      context: ./src/service/ory/order-service
    container_name: order-service
    env_file:
      - ./src/service/ory/order-service/.env
    depends_on:
      - postgres
      - kafka
      - inventory-service

  notification-service:
    build:
      context: ./src/service/ory/notification-service
    container_name: notification-service
    env_file:
      - ./src/service/ory/notification-service/.env
    depends_on:
      - mongodb
      - kafka

volumes:
  postgres_data:
  mongo_data: