spring.application.name=product-service
server.port=8085



spring.mongodb.host=${MONGO_HOST:localhost}
spring.mongodb.port=${MONGO_PORT:27017}
spring.mongodb.database=${MONGO_DATABASE:product-service}
spring.mongodb.username=${MONGO_USERNAME:product_user}
spring.mongodb.password=${MONGO_PASSWORD:product_password}
spring.mongodb.authentication-database=${MONGO_AUTH_DATABASE:product-service}