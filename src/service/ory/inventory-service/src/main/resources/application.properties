spring.application.name=inventory-service
server.port=8082

spring.grpc.server.address=localhost
spring.grpc.server.port=9090

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/inventory-service}
spring.datasource.username=${DB_USERNAME:inventory_user}
spring.datasource.password=${DB_PASSWORD:inventory_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create-only

logging.level.root=warn
logging.level.vlad.way.order.service=debug
