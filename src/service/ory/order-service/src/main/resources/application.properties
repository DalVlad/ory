spring.application.name=order-service
server.port=8084
inventory.serves.url=${INVENTORY_SERVES_URL:http://localhost:8082}
inventory.get.product=${INVENTORY_GET_PRODUCT:/api/v1/inventory/{id}}


spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/order-service}
spring.datasource.username=${DB_USERNAME:order_user}
spring.datasource.password=${DB_PASSWORD:order_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create-only

logging.level.root=warn
logging.level.vlad.way.order.service=debug